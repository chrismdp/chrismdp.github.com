{% assign quote_text = include.text %}
{% assign share_url = site.url | append: page.url %}
{% assign encoded_text = quote_text | url_encode %}
{% assign encoded_url = share_url | url_encode %}

<div class="my-8 bg-brand-light-blue/10 rounded-lg overflow-hidden p-6 relative float-right w-2/5 ml-6 mb-4">
  <div class="absolute top-2 left-4 text-brand-turquoise/30 text-7xl font-serif leading-none select-none">&ldquo;</div>
  <p class="relative text-xl font-medium text-brand-black leading-relaxed m-0 p-0 pl-2 pt-6" style="font-family: 'DM Sans', sans-serif; font-style: italic;">
    {{ quote_text }}
  </p>
  <div class="mt-4 pl-2 flex items-center gap-3">
    <a href="https://www.linkedin.com/sharing/share-offsite/?text={{ encoded_text }}&url={{ encoded_url }}"
       target="_blank" rel="noopener" title="Share on LinkedIn"
       onclick="if(typeof posthog!=='undefined')posthog.capture('shareable_quote_clicked',{platform:'linkedin',quote:'{{ quote_text | escape }}',article_url:'{{ page.url }}'})"
       class="inline-flex items-center justify-center w-8 h-8 bg-[#0077b5] text-white rounded-full hover:bg-[#005885] transition-colors">
      <svg width="14" height="14" fill="white" viewBox="0 0 24 24">
        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
      </svg>
    </a>
    <a href="https://twitter.com/intent/tweet?text={{ encoded_text }}&url={{ encoded_url }}"
       target="_blank" rel="noopener" title="Post on X"
       onclick="if(typeof posthog!=='undefined')posthog.capture('shareable_quote_clicked',{platform:'x',quote:'{{ quote_text | escape }}',article_url:'{{ page.url }}'})"
       class="inline-flex items-center justify-center w-8 h-8 bg-brand-black text-white rounded-full hover:bg-brand-black/80 transition-colors">
      <svg width="14" height="14" fill="white" viewBox="0 0 24 24">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
    <a href="https://bsky.app/intent/compose?text={{ encoded_text }}%20{{ encoded_url }}"
       target="_blank" rel="noopener" title="Share on Bluesky"
       onclick="if(typeof posthog!=='undefined')posthog.capture('shareable_quote_clicked',{platform:'bluesky',quote:'{{ quote_text | escape }}',article_url:'{{ page.url }}'})"
       class="inline-flex items-center justify-center w-8 h-8 bg-[#1185fe] text-white rounded-full hover:bg-[#0f73d6] transition-colors">
      <svg width="14" height="14" fill="white" viewBox="0 0 600 530" xmlns="http://www.w3.org/2000/svg">
        <path d="m135.72 44.03c66.496 49.921 138.02 151.14 164.28 205.46 26.262-54.316 97.782-155.54 164.28-205.46 47.98-36.021 125.72-63.892 125.72 24.795 0 17.712-10.155 148.79-16.111 170.07-20.703 73.984-96.144 92.854-163.25 81.433 117.3 19.964 147.14 86.092 82.697 152.22-122.39 125.59-175.91-31.511-189.63-71.766-2.514-7.3797-3.6904-10.832-3.7077-7.8964-0.0174-2.9357-1.1937 0.51669-3.7077 7.8964-13.72 40.255-67.24 197.36-189.63 71.766-64.444-66.128-34.605-132.26 82.697-152.22-67.108 11.421-142.55-7.4491-163.25-81.433-5.9562-21.282-16.111-152.36-16.111-170.07 0-88.687 77.742-60.816 125.72-24.795z"/>
      </svg>
    </a>
  </div>
</div>
